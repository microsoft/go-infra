name: Check Line Endings

# Reusable workflow that verifies the calling repository has no files checked
# in with mixed or CRLF line endings, per the repo's .gitattributes rules.
#
# Usage from another repo:
#
#   name: Check Line Endings
#   on:
#     push:
#     pull_request:
#   jobs:
#     check-line-endings:
#       uses: microsoft/go-infra/.github/workflows/check-line-endings.yml@main

on:
  workflow_call:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  check-line-endings:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for CRLF or mixed line endings
        shell: bash
        run: |
          set -euo pipefail
          BAD=$(git ls-files --eol | awk '$1 ~ /(mixed|crlf)/ || $2 ~ /(mixed|crlf)/ {print $1, $2, $NF}')
          if [ -n "$BAD" ]; then
            echo "::error::Files with CRLF or mixed line endings detected:"
            echo "$BAD"
            exit 1
          fi
          echo "No CRLF or mixed line endings found."
