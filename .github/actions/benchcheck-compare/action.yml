name: 'Compare benchmark results'
description: |
  Run benchstat and the benchcheck tool on a pair of "go test -bench" output
  files, then upload the results as a workflow artifact.

  Designed to be called from a per-matrix-cell bench job after producing
  base.txt and head.txt. Pair with the benchmark-setup and benchmark-conclusion
  reusable workflows in microsoft/go-infra.

inputs:
  base-file:
    description: 'Path to the base benchmarks output file.'
    required: false
    default: 'base.txt'
  head-file:
    description: 'Path to the head benchmarks output file.'
    required: false
    default: 'head.txt'
  artifact-name:
    description: |
      Name for the uploaded artifact. Must start with "benchstat-" so the
      conclusion workflow picks it up. The portion after the prefix is used
      verbatim as the matrix-cell label in the PR comment.
    required: true

runs:
  using: composite
  steps:
    # Capture this composite action's own ref. Doing it in a `run:` step is
    # important: `${{ github.action_ref }}` evaluated inside a `with:` block of
    # a `uses:` step refers to the inner action's ref (e.g., actions/checkout),
    # not to this composite action.
    - name: Resolve composite action ref
      id: ref
      shell: bash
      run: |
        ref="${GITHUB_ACTION_REF:-}"
        if [ -z "$ref" ]; then
          echo "::error::GITHUB_ACTION_REF is empty; cannot determine which microsoft/go-infra ref to check out."
          exit 1
        fi
        echo "ref=$ref" >> "$GITHUB_OUTPUT"

    - name: Checkout go-infra (for benchcheck)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: microsoft/go-infra
        ref: ${{ steps.ref.outputs.ref }}
        path: _go-infra-benchcheck

    - name: Build benchcheck
      shell: bash
      run: |
        go build -C _go-infra-benchcheck/cmd/benchcheck -o "$RUNNER_TEMP/benchcheck" .

    - name: Run benchstat
      shell: bash
      run: |
        go -C _go-infra-benchcheck tool benchstat \
          "${{ inputs.base-file }}" "${{ inputs.head-file }}" \
          | tee benchstat.txt || true

    - name: Run benchcheck check
      shell: bash
      run: |
        "$RUNNER_TEMP/benchcheck" check \
          -o-regressions=regressions.txt \
          -o-failures=failures.txt \
          -o-status=status.json \
          "${{ inputs.base-file }}" "${{ inputs.head-file }}"

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          benchstat.txt
          regressions.txt
          failures.txt
          status.json
