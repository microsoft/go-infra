name: Create go-infra patch release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run: calculate the next v0.0.x release without creating it."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: create-go-infra-patch-release
  cancel-in-progress: false

jobs:
  create:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release-on-merge'))
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Alert unsupported fork-triggered release
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::This workflow cannot create releases when triggered by merged PRs from forks because GITHUB_TOKEN does not have write access. Ask a maintainer with workflow dispatch permissions to re-run this workflow with workflow_dispatch from the base repository, or create the release manually."
          exit 1

      - name: "Create next go-infra patch release (dry: ${{ env.DRY_RUN }})"
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          go run ./cmd/releasego create-go-infra-patch
          -repo="${{ github.repository }}"
          -github-pat="$GH_TOKEN"
          -dry-run="${{ env.DRY_RUN }}"
