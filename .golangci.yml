version: "2"
linters:
  enable:
    - bodyclose
    - godox
    - nakedret
    - predeclared
    - unconvert
    - whitespace
  settings:
    whitespace:
      # Enforce a newline (or comment) after every multi-line if statement.
      multi-if: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
