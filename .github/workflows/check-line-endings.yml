name: Check Line Endings

# Reusable workflow that verifies a repo's files match its .gitattributes
# line-ending rules. Call from another repo with:
#
#   jobs:
#     check-line-endings:
#       uses: microsoft/go-infra/.github/workflows/check-line-endings.yml@main

on:
  workflow_call:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  check-line-endings:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check .gitattributes has a default text rule
        shell: bash
        run: |
          set -euo pipefail
          # Probe a nonexistent file to see what attributes apply by default.
          # Without a default (e.g. `* text=auto eol=lf`), the renormalize step
          # would silently pass for files lacking an explicit attribute.
          probe=$(git check-attr text eol -- probe-file-intentionally-does-not-exist.xyz)
          echo "$probe"
          if ! echo "$probe" | grep -qE '^[^:]+: text: (auto|set|lf|crlf)$'; then
            echo "::error::.gitattributes is missing a default text rule (e.g. '* text=auto eol=lf')."
            exit 1
          fi
          if ! echo "$probe" | grep -qE '^[^:]+: eol: lf$'; then
            echo "::error::.gitattributes is missing a default 'eol=lf' rule (e.g. '* text=auto eol=lf'). This ensures Go tests and tools behave consistently across platforms."
            exit 1
          fi

      - name: Check line endings match .gitattributes
        shell: bash
        run: |
          set -euo pipefail
          git add --renormalize .
          if ! git diff --cached --stat --exit-code; then
            echo "::error::Line endings don't match .gitattributes. Run 'git add --renormalize .' locally and commit."
            exit 1
          fi
