# Reusable workflow that runs a single benchmark matrix cell end-to-end:
# checkout HEAD and BASE, run `go test -bench=.` against each, then run
# benchstat + benchcheck check and upload the results as an artifact.
#
# Designed to be called from a per-backend `benchmark.yml` with a matrix
# strategy. Pair with benchmark-setup.yml (head/base ref resolution) and
# benchmark-conclusion.yml (PR comment) in this repo.

name: Run benchmark cell

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'GitHub Actions runner label.'
        required: true
        type: string
      go-version:
        description: 'Go version to install via actions/setup-go.'
        required: true
        type: string
      go-download-base-url:
        description: 'Override go-download-base-url for setup-go (empty uses upstream).'
        required: false
        type: string
        default: 'https://aka.ms/golang/release/latest'
      head-ref:
        description: 'Resolved head ref from benchmark-setup.'
        required: true
        type: string
      base-ref:
        description: 'Resolved base ref from benchmark-setup.'
        required: true
        type: string
      artifact-name:
        description: |
          Name for the uploaded artifact. Must start with "benchstat-" so the
          conclusion workflow picks it up. The portion after the prefix is
          used verbatim as the matrix-cell label in the PR comment.
        required: true
        type: string
      infra-ref:
        description: |
          Ref of microsoft/go-infra to check out for benchcheck source. Should
          match the @ref the caller used on this reusable workflow.
        required: true
        type: string
      fips-mode:
        description: |
          If non-empty, enables FIPS mode for benchmarks. On Windows runners
          this writes the FipsAlgorithmPolicy registry key. The value is also
          exported as GO_TEST_FIPS to the bench steps.
        required: false
        type: string
        default: ''
      cgo-enabled:
        description: 'If non-empty, exported as CGO_ENABLED to the bench steps.'
        required: false
        type: string
        default: ''
      xcode-version:
        description: |
          If non-empty, runs `sudo xcode-select -s /Applications/Xcode_<v>.app`
          before benchmarking (macOS only).
        required: false
        type: string
        default: ''

jobs:
  bench:
    runs-on: ${{ inputs.runs-on }}
    env:
      MS_GO_NOSYSTEMCRYPTO: "1"
      GO_TEST_FIPS: ${{ inputs.fips-mode }}
      CGO_ENABLED: ${{ inputs.cgo-enabled }}
    steps:
      - name: Initialize status
        shell: bash
        run: echo '{"regression":false,"test_failures":false,"benchmark_error":true}' > status.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-download-base-url: ${{ inputs.go-download-base-url }}

      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.head-ref }}
          path: head

      - name: Checkout BASE
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base-ref }}
          path: base

      - name: Checkout go-infra (for benchcheck)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/go-infra
          ref: ${{ inputs.infra-ref }}
          path: _go-infra

      - name: Set FIPS mode (Windows)
        if: inputs.fips-mode != '' && runner.os == 'Windows'
        shell: cmd
        run: REG ADD HKLM\SYSTEM\CurrentControlSet\Control\Lsa\FipsAlgorithmPolicy /v Enabled /t REG_DWORD /f /d ${{ inputs.fips-mode }}

      - name: Select Xcode
        if: inputs.xcode-version != ''
        shell: bash
        run: sudo xcode-select -s "/Applications/Xcode_${{ inputs.xcode-version }}.app"

      - name: Run benchmarks (base)
        shell: bash
        working-directory: base
        run: |
          go test -run='^$' -bench=. -count=10 -benchmem -timeout 60m ./... 2>&1 | tee ../base.txt || true

      - name: Run benchmarks (head)
        shell: bash
        working-directory: head
        run: |
          go test -run='^$' -bench=. -count=10 -benchmem -timeout 60m ./... 2>&1 | tee ../head.txt || true

      - name: "📊 Compare and check"
        shell: bash
        run: |
          go -C _go-infra tool benchstat "$GITHUB_WORKSPACE/base.txt" "$GITHUB_WORKSPACE/head.txt" | tee benchstat.txt || true
          go build -C _go-infra/cmd/benchcheck -o "$PWD/benchcheck" .
          ./benchcheck check \
            -o-regressions=regressions.txt \
            -o-failures=failures.txt \
            -o-status=status.json \
            base.txt head.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            benchstat.txt
            regressions.txt
            failures.txt
            status.json
